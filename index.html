<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdelaziz & Omnia Wedding Invitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold-primary: #c5a059;
            --gold-dark: #aa771c;
            --gold-light: #fbf5b7;
            --bg-cream: #f9f6f0;
            --text-dark: #4a4135;
            --text-light: #7a6e5d;
            --shadow-card: 0 20px 50px rgba(197, 160, 89, 0.15);
            --transition-smooth: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            font-family: 'Cinzel', 'Amiri', serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #ffffff 0%, #f4f0e6 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Luxury Decorative Border Flowers Overlay effect */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.12;
            pointer-events: none;
            z-index: 1000;
        }
        body::before { top: 0; left: 0; background-image: url('https://i.imgur.com/w97g3X6.png'); }
        body::after { bottom: 0; right: 0; background-image: url('https://i.imgur.com/w97g3X6.png'); transform: rotate(180deg); }

        .main-wrapper {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ----------------------------------
           ENVELOPE INTERACTIVE DESIGN
        ---------------------------------- */
        .envelope-container {
            width: 100%;
            max-width: 550px;
            height: 380px;
            perspective: 1500px;
            margin: 40px 0;
            cursor: pointer;
            position: relative;
            z-index: 10;
            transition: var(--transition-smooth);
        }

        .envelope-container.opened {
            height: 0;
            margin: 0;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9) translateY(-50px);
        }

        .envelope {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, #f3ede0 0%, #dfd5be 100%);
            border-radius: 4px;
            box-shadow: 0 30px 70px rgba(74, 65, 53, 0.25);
            transform-style: preserve-3d;
            border: 1px solid rgba(197, 160, 89, 0.4);
        }

        .
