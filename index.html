<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Abdelaziz & Omnia Wedding</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #fcfaf6; font-family: 'Times New Roman', serif; margin: 0; color: #5a4b3a; text-align: center; }
        
        /* الظرف الذهبي */
        .envelope-container { margin: 50px auto; width: 350px; height: 250px; background: #d4af37; border: 3px solid #b8860b; position: relative; }
        .seal { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); background: #c5a059; border: 4px solid #fcfaf6; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; color: white; }

        /* الكرت الرئيسي */
        .card { max-width: 600px; margin: 20px auto; background: white; padding: 40px; border: 1px solid #e3d3b3; }
        .title { color: #8b7345; font-size: 2.5rem; margin: 20px 0; }
        
        /* الصور والقصة */
        .gallery { display: flex; justify-content: space-around; margin: 30px 0; }
        .gallery img { width: 120px; height: 120px; border-radius: 50%; border: 2px solid #e3d3b3; }

        /* القائمة السفلية التي فقدتها */
        .bottom-nav { display: flex; justify-content: space-between; padding: 20px; background: #fcfaf6; border-top: 2px solid #e3d3b3; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #8b7345; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="envelope-container">
        <div class="seal"><i class="fa-solid fa-heart"></i></div>
    </div>

    <div class="card">
        <p>YOU ARE INVITED</p>
        <h1 class="title">ABDELAZIZ & OMNIA</h1>
        <p>18 JULY 2026</p>
        
        <div class="gallery">
            <img src="child-abdelaziz.jpg" alt="Abdelaziz">
            <img src="child-omnia.jpg" alt="Omnia">
        </div>

        <p>JOYFULLY INVITE YOU TO CELEBRATE THEIR WEDDING</p>

        <div class="bottom-nav">
            <div class="nav-item"><i class="fa-solid fa-house"></i> الرئيسية</div>
            <div class="nav-item"><i class="fa-solid fa-book-open"></i> قصتنا</div>
            <div class="nav-item"><i class="fa-solid fa-calendar-days"></i> التاريخ</div>
            <div class="nav-item"><i class="fa-solid fa-location-dot"></i> القاعة</div>
            <div class="nav-item"><i class="fa-solid fa-image"></i> معرض الصور</div>
            <div class="nav-item"><i class="fa-solid fa-envelope"></i> RSVP</div>
        </div>
    </div>

</body>
</html>
