<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdelaziz & Omnia Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #fdfbf7; }
        body { background-color: var(--bg); font-family: 'Cinzel', serif; color: #4a4135; text-align: center; margin: 0; padding: 20px; }
        
        /* إطار ملكي ذهبي */
        .royal-border { border: 2px double var(--gold); padding: 40px; max-width: 600px; margin: 0 auto; background: white; }
        
        .names { font-size: 2.2rem; color: var(--gold); margin: 20px 0; border-bottom: 1px solid var(--gold); padding-bottom: 10px; }
        
        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 30px; }
        .box { border: 1px solid #dcd1b9; padding: 15px; font-size: 0.9rem; }
        
        .btn-rsvp { background: var(--gold); color: white; border: none; padding: 15px 30px; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="royal-border">
    <div style="font-family: 'Amiri'; color: var(--gold);">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
    <div class="names">ABDELAZIZ & OMNIA</div>
    <p>JOYFULLY INVITE YOU TO CELEBRATE THEIR WEDDING</p>
    <p>18 JULY 2026</p>

    <div class="grid-layout">
        <div class="box">📅 التاريخ: 18 يوليو 2026</div>
        <div class="box">🏛 القاعة: LOUVRE HEIGHTS</div>
        <div class="box">📖 قصتنا: بدأت منذ الصغر</div>
        <div class="box">📸 معرض الصور: متاح</div>
    </div>

    <button class="btn-rsvp">تأكيد الحضور (RSVP)</button>
</div>

</body>
</html>
