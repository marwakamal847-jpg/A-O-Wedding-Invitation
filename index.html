<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abdelaziz & Omnia Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Great+Vibes&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background:#f8f4ea;
display:flex;
justify-content:center;
align-items:center;
font-family:Cinzel;
overflow:hidden;
}


/* language */

.lang{
position:absolute;
top:20px;
right:20px;
}

.lang button{
padding:8px 15px;
border:1px solid #c9a227;
background:white;
cursor:pointer;
}



/* Envelope */

.container{
perspective:1000px;
}

.envelope{
width:350px;
height:230px;
background:#fff;
border:3px solid #c9a227;
position:relative;
cursor:pointer;
transform-style:preserve-3d;
transition:1s;
}


.flap{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#fff;
clip-path:polygon(0 0,100% 0,50% 55%);
border-bottom:2px solid #c9a227;
transform-origin:top;
transition:1s;
z-index:3;
}


.paper{
position:absolute;
width:90%;
height:90%;
background:white;
top:10%;
left:5%;
padding:25px;
text-align:center;
transform:translateY(100%);
transition:1.5s;
box-shadow:0 0 20px #aaa;
}


.open .flap{
transform:rotateX(180deg);
}


.open .paper{
transform:translateY(-40%);
}



/* names */

.names{
font-family:"Great Vibes";
font-size:45px;
color:#b08a16;
}


.ayat{
font-family:"Aref Ruqaa";
font-size:28px;
margin:20px;
}


/* Calendar */

.calendar{
margin:15px auto;
width:250px;
}


.days{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}


.day{
padding:5px;
}


.heart{
color:#c9a227;
font-size:25px;
}


/* Gallery */

.gallery img{
width:100px;
height:70px;
object-fit:cover;
animation:move 5s infinite;
}

@keyframes move{
50%{
transform:scale(1.1);
}
}


/* RSVP */

.popup{
display:none;
position:fixed;
background:white;
border:2px solid #c9a227;
padding:30px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:5;
}


.popup input{
display:block;
margin:10px;
padding:10px;
}


</style>

</head>


<body>


<div class="lang">
<button onclick="arabic()">العربية</button>
<button onclick="english()">English</button>
</div>


<div class="container">

<div class="envelope" onclick="openCard(this)">

<div class="flap"></div>


<div class="paper">


<div class="names">
Abdelaziz & Omnia
</div>


<div class="ayat">
وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا
</div>


<h3>
18 July 2026
</h3>


<div class="calendar">

<h3>July 2026</h3>

<div class="days">

<script>

for(let i=1;i<=31;i++){

if(i==18){

document.write(
`<div class="day heart">♥<br>${i}</div>`
)

}

else{

document.write(
`<div class="day">${i}</div>`
)

}

}

</script>

</div>

</div>


<div class="gallery">

<img src="image1.jpg">
<img src="image2.jpg">
<img src="image3.jpg">

</div>


<button onclick="rsvp(event)">
RSVP
</button>


</div>


</div>

</div>



<div class="popup" id="popup">

<h3>RSVP</h3>

<input id="name" placeholder="Name">

<input id="guests" placeholder="Number of Guests">

<button onclick="save()">Confirm</button>

<p id="msg"></p>

</div>



<script>


function openCard(x){
x.classList.toggle("open");
}



function rsvp(e){

e.stopPropagation();

document.getElementById("popup").style.display="block";

}


function save(){

let n=document.getElementById("name").value;
let g=document.getElementById("guests").value;


localStorage.setItem("Guest",n);
localStorage.setItem("People",g);


document.getElementById("msg").innerHTML=
"Thank you for confirming 🤍";


}


function arabic(){

document.body.dir="rtl";

}

function english(){

document.body.dir="ltr";

}


</script>


</body>
</html>
