<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdelaziz & Omnia Wedding Invitation</title>
    <!-- إضافة الخطوط المطلوبة للفخامة -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* تعريف الألوان الأساسية */
        :root {
            --gold: #c5a059;
            --text-color: #4a4135;
        }

        body {
            /* تطبيق الصورة كخلفية كما طلبت */
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            font-family: 'Cinzel', serif;
            color: var(--text-color);
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* إطار ملكي ذهبي يحيط بمحتوى الدعوة */
        .royal-border {
            border: 2px double var(--gold);
            padding: 60px;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.9); /* خلفية شبه شفافة لإبراز صورة الخلفية */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .basmala {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .names {
            font-size: 2.8rem;
            color: var(--gold);
            margin: 20px 0;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 15px;
            letter-spacing: 3px;
        }

        .invitation-text {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .box {
            border: 1px solid #dcd1b9;
            padding: 20px;
            font-size: 0.95rem;
            background: #ffffff;
        }

        .btn-rsvp {
            background: var(--gold);
            color: white;
            border: none;
            padding: 18px 40px;
            margin-top: 40px;
            cursor: pointer;
            font-family: 'Cinzel', sans-serif;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .btn-rsvp:hover {
            background: #a88545;
        }
    </style>
</head>
<body>

<div class="royal-border">
    <div class="basmala">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
    
    <div class="names">ABDELAZIZ & OMNIA</div>
    
    <p class="invitation-text">
        يسعدنا دعوتكم لمشاركتنا فرحة العمر<br>
        في حفل زفافنا الموعود
    </p>

    <div class="grid-layout">
        <div class="box">📅 <strong>التاريخ:</strong><br>18 يوليو 2026</div>
        <div class="box">🏛 <strong>القاعة:</strong><br>LOUVRE HEIGHTS</div>
        <div class="box">📖 <strong>قصتنا:</strong><br>من الطفولة إلى الأبد</div>
        <div class="box">📸 <strong>معرض الصور:</strong><br>لحظات لا تُنسى</div>
    </div>

    <button class="btn-rsvp">تأكيد الحضور (RSVP)</button>
</div>

</body>
</html>
