<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdelaziz & Omnia Wedding Invitation</title>
    
    <base href="/A-O-Wedding-Invitation/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold-classic: #b89763;
            --parchment: #fdfbf7;
            --envelope-vintage: #d3c8b7;
            --text-color: #3e362e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--parchment);
            color: var(--text-color);
            font-family: 'Amiri', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* تم حذف كود الحدود الزاوية بالكامل */

        .main-container { width: 100%; max-width: 700px; display: flex; flex-direction: column; align-items: center; }

        /* ✉️ تصميم مظروف عتيق (Vintage Envelope) */
        .envelope-wrapper {
            width: 100%; max-width: 450px; height: 300px; position: relative;
            cursor: pointer; transition: 0.8s; margin: 50px 0;
            background: var(--envelope-vintage);
            border: 2px solid #b5a995;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        .envelope-flap {
            position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: #c5b9a5;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transition: 0.6s; transform-origin: top;
        }

        .wax-seal {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            background: #8b6840;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #d3c8b7; border: 2px solid #5a452d;
        }

        .envelope-wrapper.hidden-envelope { opacity: 0; pointer-events: none; height: 0; margin: 0; }

        /* 📜 تنسيق الكرت */
        .invitation-card {
            display: none; opacity: 0; text-align: center;
            padding: 40px; border: 1px solid #e0d8cc;
            background: white; width: 100%;
        }
        .invitation-card.revealed { display: block; opacity: 1; transition: 1s; }

        .names { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--gold-classic); margin: 20px 0; }
        .date { font-size: 1.4rem; border-top: 1px solid var(--gold-classic); padding-top: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="envelope-wrapper" id="envelopeWrapper" onclick="openEnv()">
            <div class="envelope-flap" id="flap"></div>
            <div class="wax-seal"><i class="fa-solid fa-heart"></i></div>
        </div>

        <div class="invitation-card" id="card">
            <div class="names">ABDELAZIZ & OMNIA</div>
            <p>يتشرفان بدعوتكم لحضور حفل الزفاف</p>
            <div class="date">18 JULY 2026</div>
        </div>
    </div>

    <script>
        function openEnv() {
            document.getElementById('flap').style.transform = 'rotateX(180deg)';
            setTimeout(() => {
                document.getElementById('envelopeWrapper').classList.add('hidden-envelope');
                document.getElementById('card').classList.add('revealed');
            }, 600);
        }
    </script>
</body>
</html>
