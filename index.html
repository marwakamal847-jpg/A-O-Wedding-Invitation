<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdelaziz & Omnia Wedding Invitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700;900&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- الألوان الافتراضية للثيم الملكي (أبيض وذهبي) --- */
        :root {
            --royal-gold: #c5a059;
            --dark-gold: #8a6f3e;
            --light-cream: #fdfbf7;
            --envelope-bg: #f4ebd4;
            --bg-dark: #0d0d0d;
            --shadow-premium: 0 30px 60px rgba(0, 0, 0, 0.4);
            --transition-bounce: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-smooth: all 0.6s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1e1e1e 0%, #050505 100%);
            color: var(--light-cream);
            font-family: 'Playfair Display', 'Amiri', serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* --- زر تبديل اللغة في الأعلى --- */
        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        html[dir="ltr"] .lang-switcher {
            right: auto;
            left: 20px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--royal-gold);
            color: var(--royal-gold);
            padding: 10px 22px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: var(--transition-smooth);
            backdrop-filter: blur(5px);
            border-radius: 4px;
        }

        .lang-btn:hover {
            background: var(--royal-gold);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--royal-gold);
        }

        /* --- الحاوية الرئيسية للموقع --- */
        .invitation-main-container {
            width: 100%;
            max-width: 700px;
            padding: 100px 20px 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- أبعاد المظروف الـ 3D لمنع التداخل --- */
        .envelope-scene {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 330px;
            perspective: 1500px;
            margin-bottom: 40px;
            transition: var(--transition-smooth);
        }

        /* عند فتح المظروف يختفي ليعطي مساحة للكرت الداخلي انسيابياً */
        .envelope-scene.is-opened {
            height: 0;
            margin-bottom: 0;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8) translateY(-100px);
        }

        .envelope-box {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: var(--envelope-bg);
            border-radius: 6px;
            box-shadow: var(--shadow-premium);
            transform-style: preserve-3d;
            border: 1px solid rgba(197, 160, 89, 0.3);
            cursor: pointer;
            transition: var(--transition-bounce);
        }

        .envelope-box:hover {
            transform: translateY(-5px) scale(1.02);
        }

        /* غطاء المظروف العلوي */
        .flap-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e8ddbe;
            clip-path: polygon(0 0, 50% 55%, 100% 0);
            transform-origin: top;
            z-index: 3;
            transition: var(--transition-bounce);
            border-bottom: 1px solid rgba(197, 160, 89, 0.4);
        }
